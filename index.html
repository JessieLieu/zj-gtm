<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品需求提报 - 浙江省</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif; background: #f0f2f5; min-height: 100vh; color: #1a1a2e; display: flex; flex-direction: column; align-items: center; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: center; width: 100%; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.15); }
.header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
.container { width: 100%; max-width: 750px; margin: 40px 20px; }
.card { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); padding: 32px 36px; }
.card-title { font-size: 18px; font-weight: 600; margin-bottom: 24px; padding-bottom: 14px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 8px; }
.card-title::before { content: ''; display: inline-block; width: 4px; height: 18px; background: #0f3460; border-radius: 2px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 13px; font-weight: 600; color: #444; }
.form-group label .required { color: #e74c3c; margin-left: 2px; }
.form-group input, .form-group select { height: 42px; padding: 0 12px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; transition: border-color .2s, box-shadow .2s; outline: none; font-family: inherit; background: #fff; }
.form-group input:focus, .form-group select:focus { border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,.08); }
.form-group select { cursor: pointer; }
.loading { color: #999; font-size: 13px; }
.stock-warning { font-size: 12px; color: #e74c3c; display: none; align-items: center; gap: 4px; }
.btn { padding: 11px 28px; border: none; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: #0f3460; color: #fff; } .btn-primary:hover { background: #1a4a7a; } .btn-primary:disabled { background: #999; cursor: not-allowed; }
.btn-outline { background: #fff; color: #0f3460; border: 1px solid #0f3460; } .btn-outline:hover { background: #f0f4ff; }
.form-actions { margin-top: 28px; display: flex; gap: 12px; justify-content: center; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 28px; border-radius: 8px; color: #fff; font-weight: 600; z-index: 9999; animation: slideDown .3s ease; font-size: 14px; }
.toast.success { background: #27ae60; } .toast.error { background: #e74c3c; }
@keyframes slideDown { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
.success-card { text-align: center; padding: 20px 0; }
.success-card .checkmark { width: 72px; height: 72px; border-radius: 50%; background: #e6f7ee; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 36px; }
.success-card h3 { font-size: 20px; color: #27ae60; margin-bottom: 8px; }
.product-entry { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
.product-entry select { flex: 1; height: 40px; padding: 0 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; outline: none; font-family: inherit; }
.product-entry select:focus { border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,.08); }
.product-entry input[type=number] { width: 72px; height: 40px; padding: 0 8px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; outline: none; }
.product-entry input[type=number]:focus { border-color: #0f3460; box-shadow: 0 0 0 3px rgba(15,52,96,.08); }
.entry-hint { white-space: nowrap; }
.channel-group { border: 1px solid #e0e0e0; border-radius: 8px; padding: 12px; margin-bottom: 10px; background: #fafbfc; }
.channel-group .ch-title { font-size: 13px; font-weight: 600; color: #0f3460; margin-bottom: 8px; }
.ch-group-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 6px; justify-content: flex-start; }
.ch-group-form .form-group { flex: 1; min-width: 100px; text-align: left; }
.ch-group-form input, .ch-group-form select { height: 36px; padding: 0 6px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; font-family: inherit; }
.channel-suggestions { position: absolute; top: 100%; left: 0; right: 0; max-height: 200px; overflow-y: auto; background: #fff; border: 1px solid #d0d0d0; border-radius: 6px; box-shadow: 0 4px 12px rgba(0,0,0,.1); z-index: 170; font-size: 14px; }
.channel-suggestions button { padding: 8px 12px; cursor: pointer; }
.channel-suggestions button:hover { background: #f0f4ff; color: #0f3460; }
.success-card p { color: #888; margin-bottom: 24px; }
.footer { text-align: center; color: #bbb; font-size: 12px; margin-top: 16px; }
@media (max-width: 480px) {
  .header { padding: 0 12px; height: 48px; }
  .header h1 { font-size: 16px; }
  .container { margin: 16px 8px; }
  .card { padding: 20px 14px; border-radius: 8px; }
  .card-title { font-size: 15px; margin-bottom: 16px; }
  .form-grid { grid-template-columns: 1fr; gap: 12px; }
  .form-group input, .form-group select { height: 40px; font-size: 14px; }
  .btn { padding: 10px 20px; font-size: 14px; width: 100%; justify-content: center; }
  .form-actions { flex-direction: column; }
  .success-card { padding: 12px 0; }
  .channel-group { padding: 8px; }
  .ch-group-form { flex-direction: column; gap: 6px; align-items: stretch; }
  .ch-group-form .form-group { min-width: auto; width: 100%; }
  .ch-group-form input, .ch-group-form select { width: 100%; box-sizing: border-box; }
  .product-entry { flex-wrap: wrap; gap: 4px; }
  .product-entry select { flex: 1 1 100%; min-width: 0; font-size: 14px; height: 38px; }
  .product-entry input[type=number] { width: 64px; height: 38px; font-size: 14px; }
  .product-entry .btn-sm { padding: 5px 10px; }
  .entry-hint { font-size: 11px !important; flex: 1 1 100%; }
}
</style>
</head>
<body>
<div class="header"><h1>📱 产品需求提报 · 浙江省</h1><button onclick="location.reload(true)" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.4);padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer;">🔄 刷新</button></div>
<div class="container">
  <div class="card" id="formCard">
    <div class="card-title">需求提报 <span class="loading" id="loadStatus"></span></div>
    <form id="demandForm" onsubmit="return submitDemand(event)">
      <div class="form-grid">
        <div class="form-group"><label>地市<span class="required">*</span></label><select id="city" required><option value="">请选择地市</option></select></div>
        <div class="form-group"><label>填报人<span class="required">*</span></label><input type="text" id="reporter" placeholder="请输入姓名" required></div>
      </div>
        <div id="channelGroups"></div>
        <button type="button" class="btn btn-outline btn-sm" onclick="addChannelGroup()" style="margin-top:8px;">➕ 添加渠道</button>
        <div id="categoryHint" style="font-size:12px;color:#e67e22;margin-top:8px;display:none;">⚠️ 演示样机 / 哑机 / 礼品 仅限太力通路提货，当前通路不可选</div>
        <div class="form-group" style="margin-top:12px;"><label>提报原因<span style="color:#999;font-weight:400;">（选填）</span></label><input type="text" id="reason" placeholder="请说明需求原因（选填）" maxlength="200"></div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="submitBtn">✅ 提交需求</button>
        <button type="button" class="btn btn-outline" onclick="resetForm()">🔄 重置</button>
      </div>
    </form>
  </div>
  <div class="card" id="successCard" style="display:none;">
    <div class="success-card"><div class="checkmark">✅</div><h3>提报成功！</h3><p id="successMsg"></p><button class="btn btn-primary" onclick="newSubmission()">📝 继续提报</button> <button class="btn btn-outline" onclick="endSubmission()">✓ 结束</button></div>
  </div>
  <div class="footer">浙江省产品需求提报系统 · v2.0</div>
</div>
<div id="toastContainer"></div>
<datalist id="allChannelsList"></datalist>

<script>
var SB_URL = 'https://hrehnrlswtgkucoeoezb.supabase.co/rest/v1';
var SB_KEY = 'sb_publishable_n1A-HZY2F5F7Vf5jni23Vw_WvTcvHdf';
var CITIES = ['杭州市','宁波市','温州市','嘉兴市','湖州市','绍兴市','金华市','衢州市','舟山市','台州市','丽水市'];
var productList = [];

function showToast(msg, type) {
  var c = document.getElementById('toastContainer');
  var t = document.createElement('div');
  t.className = 'toast ' + (type||'info'); t.textContent = msg;
  c.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(function(){ t.remove(); },300); },2000);
}

function api(method, path, body) {
  var opts = { method: method, headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY } };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  if (method === 'GET' && path.indexOf('?') >= 0) {
    opts.headers['Prefer'] = 'count=exact';
  }
  return fetch(SB_URL + path, opts).then(function(r) {
    if (!r.ok) return r.text().then(function(t) { throw new Error(r.status + ': ' + t); });
    var ct = r.headers.get('content-type') || '';
    return ct.indexOf('application/json') >= 0 ? r.json() : r.text();
  });
}

function populateProductSelect(sel) {
  var prevVal = sel.value;
  var group = sel.closest('.channel-group');
  var dcSel = group ? group.querySelector('.ch-delivery') : null;
  var dc = dcSel ? dcSel.value : '';
  while (sel.options.length > 1) sel.remove(1);
  var found = false;
  productList.forEach(function(p) {
    if ((p.category === '演示样机' || p.category === '哑机' || p.category === '礼品') && dc !== '太力') return;
    var opt = document.createElement('option');
    opt.value = p.name;
    var label = p.name + (p.in_stock ? '' : ' [缺货]');
    if (p.category && p.category !== '销售机') label += ' [' + p.category + ']';
    opt.textContent = label;
    if (!p.in_stock) opt.style.color = '#e74c3c';
    sel.appendChild(opt);
    if (p.name === prevVal) found = true;
  });
  if (found) sel.value = prevVal;
}

var CAT_ORDER = { '销售机': 0, '演示样机': 1, '哑机': 2, '礼品': 3 };
function sortProductList() {
  productList.sort(function(a, b) {
    var ca = CAT_ORDER[a.category || '销售机'] !== undefined ? CAT_ORDER[a.category || '销售机'] : 99;
    var cb = CAT_ORDER[b.category || '销售机'] !== undefined ? CAT_ORDER[b.category || '销售机'] : 99;
    if (ca !== cb) return ca - cb;
    return (a.name || '').localeCompare(b.name || '');
  });
}

function loadProducts() {
  document.getElementById('loadStatus').textContent = '加载中...';
  return api('GET', '/products?select=*&order=name')
    .then(function(data) {
      productList = data || [];
      sortProductList();
      document.querySelectorAll('.channel-group .product-entry select').forEach(populateProductSelect);
      document.getElementById('loadStatus').textContent = '';
    })
    .catch(function(e) {
      document.getElementById('loadStatus').textContent = '⚠️ 加载失败，请刷新';
      console.error(e);
    });
}

function addChannelGroup() {
  var container = document.getElementById('channelGroups');
  var idx = container.querySelectorAll('.channel-group').length + 1;
  var div = document.createElement('div');
  div.className = 'channel-group';
  div.innerHTML =
    '<div class="ch-title">📋 渠道 ' + idx + ' <button type="button" class="btn btn-danger btn-sm ch-remove" onclick="removeChannelGroup(this)">✕ 移除</button></div>' +
    '<div class="ch-group-form">' +
      '<div class="form-group"><label>渠道名称<span class="required">*</span></label><div style="position:relative;"><input type="text" class="ch-name" placeholder="请输入渠道名称" list="allChannelsList" autocomplete="off" required oninput="showChSuggest(this)" onfocus="showChSuggest(this)"><div class="channel-suggestions" style="display:none;"></div></div></div>' +
      '<div class="form-group"><label>提货通路<span class="required">*</span></label><select class="ch-delivery" required onchange="onChDeliveryChange(this)"><option value="">请选择</option><option value="太力">太力</option><option value="移动">移动</option><option value="和动力">和动力</option><option value="天翼">天翼</option><option value="联通">联通</option></select></div>' +
      '<div class="form-group ch-code-group"><label>渠道八码<span class="ch-code-star required" style="color:#e74c3c;">*</span></label><input type="text" class="ch-code" placeholder="00开头的10位数字" maxlength="10"></div>' +
    '</div>' +
    '<div class="products-in-ch">' +
      '<div class="product-entry"><select required onchange="onProductChange(this)"><option value="">请选择产品</option></select><input type="number" placeholder="数量" required min="1" value="1" onchange="onQuantityChange(this)"><button type="button" class="btn btn-outline btn-sm" onclick="removeProductEntry(this)" title="移除" style="color:#e74c3c;border-color:#e74c3c;">✕</button><span class="entry-hint" style="font-size:11px;color:#e74c3c;display:none;"></span></div>' +
    '</div>' +
    '<button type="button" class="btn btn-outline btn-sm" onclick="addProductEntryToGroup(this.parentElement)" style="margin-top:6px;">➕ 添加产品</button>';
  container.appendChild(div);
  populateProductSelect(div.querySelector('.product-entry select'));
  onChDeliveryChange(div.querySelector('.ch-delivery'));
}

function removeChannelGroup(btn){var gs=document.querySelectorAll('.channel-group');if(gs.length<=1){showToast('至少保留一个渠道','info');return;}btn.closest('.channel-group').remove();}
function addProductEntryToGroup(groupEl){var c=groupEl.querySelector('.products-in-ch');var d=document.createElement('div');d.className='product-entry';d.innerHTML='<select required onchange="onProductChange(this)"><option value="">请选择产品</option></select><input type="number" placeholder="数量" required min="1" value="1" onchange="onQuantityChange(this)"><button type="button" class="btn btn-outline btn-sm" onclick="removeProductEntry(this)" title="移除" style="color:#e74c3c;border-color:#e74c3c;">✕</button><span class="entry-hint" style="font-size:11px;color:#e74c3c;display:none;"></span>';c.appendChild(d);populateProductSelect(d.querySelector('select'));}
function addProductEntry() { addProductEntryToGroup(document.querySelector('.channel-group')); }

function old_addProductEntry() {
  var container = document.getElementById('productEntries');
  var div = document.createElement('div');
  div.className = 'product-entry';
  div.innerHTML = '<select required onchange="onProductChange(this)"><option value="">请选择产品</option></select><input type="number" placeholder="数量" required min="1" value="1" onchange="onQuantityChange(this)"><button type="button" class="btn btn-outline btn-sm" onclick="removeProductEntry(this)" title="移除" style="color:#e74c3c;border-color:#e74c3c;">✕</button><span class="entry-hint" style="font-size:11px;color:#e74c3c;display:none;"></span>';
  container.appendChild(div);
  if (productList.length > 0) populateProductSelect(div.querySelector('select'));
}

function removeProductEntry(btn) {
  var entries = btn.closest('.products-in-ch').querySelectorAll('.product-entry');
  if (entries.length <= 1) { showToast('至少保留一个产品', 'info'); return; }
  btn.parentElement.remove();
}

function onChDeliveryChange(sel) {
  var group = sel.closest('.channel-group');
  var codeGroup = group.querySelector('.ch-code-group');
  var codeInput = group.querySelector('.ch-code');
  var codeStar = group.querySelector('.ch-code-star');
  var v = sel.value;
  var needsCode = (v === '移动' || v === '和动力');
  codeGroup.style.display = needsCode ? '' : 'none';
  codeStar.style.display = needsCode ? '' : 'none';
  if (!needsCode) { codeInput.value = ''; codeInput.required = false; }
  else { codeInput.required = true; }
  var anyNonTaili = false;
  document.querySelectorAll('.ch-delivery').forEach(function(s) { if (s.value && s.value !== '太力') anyNonTaili = true; });
  document.getElementById('categoryHint').style.display = anyNonTaili ? 'block' : 'none';
  group.querySelectorAll('.product-entry select').forEach(function(ps) { populateProductSelect(ps); });
}

function onDeliveryChannelChange() {}

function showChSuggest(inp) {
  var div = inp.parentElement.querySelector('.channel-suggestions');
  if (!div) return;
  if (div._justSelected) { div._justSelected = false; return; }
  showChannelSuggestionsAt(inp.value, div, inp);
}
function hideChSuggest(inp) {
  setTimeout(function() {
    var div = inp.parentElement.querySelector('.channel-suggestions');
    if (div) div.style.display = 'none';
  }, 150);
}

function onProductChange(sel) {
  var name = sel.value;
  var p = productList.find(function(x){ return x.name === name; });
  var hint = sel.parentElement.querySelector('.entry-hint');
  hint.style.display = (p && !p.in_stock) ? 'inline' : 'none';
  if (p && !p.in_stock) hint.textContent = '⚠️ 缺货';
  var group = sel.closest('.channel-group');
  var dc = group ? (group.querySelector('.ch-delivery') ? group.querySelector('.ch-delivery').value : '') : '';
  var cn = group ? (group.querySelector('.ch-name') ? group.querySelector('.ch-name').value.trim() : '') : '';
  var effLimit = getEffectiveLimit(p, dc);
  if (effLimit) {
    var checkFn = effLimit.level === 'customer' ? getCustomerTodayUsed : getChannelTodayUsed;
    var checkKey = effLimit.level === 'customer' ? cn : dc;
    var levelLabel = effLimit.level === 'customer' ? '客户' : (effLimit.level === 'channel' ? dc : '全局');
    checkFn(name, checkKey).then(function(used) {
      var remain = Math.max(0, effLimit.limit - used);
      hint.style.display = 'inline';
      hint.style.color = '#0f3460';
      hint.textContent = '📊 ' + levelLabel + '上限' + effLimit.limit + ' 已提' + used + ' 剩' + remain;
      hint._remain = remain;
      hint._effLimit = effLimit.limit;
    });
  } else {
    hint._remain = null;
    hint._effLimit = null;
  }
}

function onQuantityChange(inp) {
  var hint = inp.parentElement.querySelector('.entry-hint');
  var qty = parseInt(inp.value) || 0;
  if (hint._remain !== null && hint._remain !== undefined && qty > hint._remain) {
    showToast('⚠️ 超出今日剩余上限（' + hint._remain + ' 件）', 'error');
  }
}

function getTodayUsed(productName) {
  var today = new Date();
  var d = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  return api('GET', '/demands?select=quantity&product=eq.' + encodeURIComponent(productName) + '&created_at=gte.' + d)
    .then(function(data) {
      var total = 0;
      (data || []).forEach(function(r) { total += r.quantity; });
      return total;
    })
    .catch(function() { return 0; });
}

function getChannelTodayUsed(productName, channel) {
  var today = new Date();
  var d = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  return api('GET', '/demands?select=quantity&product=eq.' + encodeURIComponent(productName) + '&delivery_channel=eq.' + encodeURIComponent(channel) + '&created_at=gte.' + d)
    .then(function(data) {
      var total = 0;
      (data || []).forEach(function(r) { total += r.quantity; });
      return total;
    })
    .catch(function() { return 0; });
}

function getCustomerTodayUsed(productName, channelName) {
  var today = new Date();
  var d = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  return api('GET', '/demands?select=quantity&product=eq.' + encodeURIComponent(productName) + '&channel_name=eq.' + encodeURIComponent(channelName) + '&created_at=gte.' + d)
    .then(function(data) {
      var total = 0;
      (data || []).forEach(function(r) { total += r.quantity; });
      return total;
    })
    .catch(function() { return 0; });
}

function getEffectiveLimit(p, channel) {
  if (!p) return null;
  if (p.customer_limit != null && p.customer_limit !== '') return {level: 'customer', limit: p.customer_limit};
  if (p.channel_limits) {
    try {
      var cl = typeof p.channel_limits === 'string' ? JSON.parse(p.channel_limits) : p.channel_limits;
      if (cl[channel] != null) return {level: 'channel', limit: cl[channel]};
    } catch(e) {}
  }
  if (p.daily_limit != null && p.daily_limit !== '') return {level: 'global', limit: p.daily_limit};
  return null;
}

function populateCities() {
  var sel = document.getElementById('city');
  if (sel.options.length > 1) return;
  CITIES.forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c; opt.textContent = c; sel.appendChild(opt);
  });
}

function submitDemand(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '提交中...';
  var city = document.getElementById('city').value;
  var reporter = document.getElementById('reporter').value.trim();
  var reason = document.getElementById('reason').value.trim();

  var groups = document.querySelectorAll('.channel-group');
  var allRecords = [];
  var chNames = [];

  for (var g = 0; g < groups.length; g++) {
    var grp = groups[g];
    var chName = grp.querySelector('.ch-name').value.trim();
    var deliveryChannel = grp.querySelector('.ch-delivery').value;
    var channelCode = grp.querySelector('.ch-code').value.trim();
    if (!chName) { showToast('渠道' + (g+1) + '：请输入渠道名称', 'error'); btn.disabled = false; btn.textContent = '✅ 提交需求'; return false; }
    if (!deliveryChannel) { showToast('渠道' + (g+1) + '：请选择提货通路', 'error'); btn.disabled = false; btn.textContent = '✅ 提交需求'; return false; }
    var needsCode = (deliveryChannel === '移动' || deliveryChannel === '和动力');
    if (needsCode) {
      if (!/^00\d{8}$/.test(channelCode)) { showToast('渠道' + (g+1) + '：八码须为00开头的10位数字', 'error'); btn.disabled = false; btn.textContent = '✅ 提交需求'; return false; }
    } else { channelCode = ''; }
    var entries = grp.querySelectorAll('.product-entry');
    for (var i = 0; i < entries.length; i++) {
      var sel = entries[i].querySelector('select');
      var qtyInp = entries[i].querySelector('input');
      var pn = sel.value;
      var qty = parseInt(qtyInp.value) || 0;
      if (!pn) { showToast('渠道' + (g+1) + '：请选择产品', 'error'); btn.disabled = false; btn.textContent = '✅ 提交需求'; return false; }
      if (qty < 1) { showToast('渠道' + (g+1) + '：产品数量须≥1', 'error'); btn.disabled = false; btn.textContent = '✅ 提交需求'; return false; }
      var pObj = productList.find(function(x){ return x.name === pn; });
      allRecords.push({city: city, reporter: reporter, channel_name: chName, delivery_channel: deliveryChannel, channel_code: channelCode, product: pn, in_stock: pObj ? pObj.in_stock : true, quantity: qty, reason: reason, pObj: pObj});
    }
    chNames.push(chName);
  }

  var merged = {};
  allRecords.forEach(function(r) {
    var k = r.product + '|||' + r.delivery_channel + '|||' + r.channel_name;
    if (!merged[k]) merged[k] = {product: r.product, channel: r.delivery_channel, chName: r.channel_name, quantity: 0, pObj: r.pObj};
    merged[k].quantity += r.quantity;
  });
  var uniqItems = Object.values(merged);
  function checkAll(idx) {
    if (idx >= uniqItems.length) { doSubmit(); return; }
    var item = uniqItems[idx];
    var effLimit = getEffectiveLimit(item.pObj, item.channel);
    if (!effLimit) { checkAll(idx + 1); return; }
    var checkFn = effLimit.level === 'customer' ? getCustomerTodayUsed : getChannelTodayUsed;
    var checkKey = effLimit.level === 'customer' ? item.chName : item.channel;
    var levelLabel = effLimit.level === 'customer' ? '该客户' : (effLimit.level === 'channel' ? item.channel : '全局');
    checkFn(item.product, checkKey).then(function(used) {
      if (used + item.quantity > effLimit.limit) {
        showToast('⚠️ ' + item.product + '(' + item.chName + ') 合计' + item.quantity + '件 超出' + levelLabel + '今日上限', 'error');
        btn.disabled = false; btn.textContent = '✅ 提交需求';
        return;
      }
      checkAll(idx + 1);
    }).catch(function() { checkAll(idx + 1); });
  }
  checkAll(0);

  function doSubmit() {
    var postData = allRecords.map(function(r) {
      return {city: r.city, reporter: r.reporter, channel_name: r.channel_name, delivery_channel: r.delivery_channel, channel_code: r.channel_code, product: r.product, in_stock: r.in_stock, quantity: r.quantity, reason: r.reason};
    });
    api('POST', '/demands', postData)
      .then(function() {
        document.getElementById('formCard').style.display = 'none';
        document.getElementById('successCard').style.display = 'block';
        document.getElementById('successMsg').textContent = '地市：' + city + ' | 渠道：' + chNames.length + '个 | 共' + postData.length + '条';
        btn.disabled = false; btn.textContent = '✅ 提交需求';
      })
      .catch(function(err) {
        showToast('提交失败：' + (err.message || '网络错误，请重试'), 'error');
        btn.disabled = false; btn.textContent = '✅ 提交需求';
      });
  }
  return false;
}

function resetForm() {
  document.getElementById('city').value = '';
  document.getElementById('reporter').value = '';
  document.getElementById('reason').value = '';
  document.getElementById('formCard').style.display = '';
  document.getElementById('successCard').style.display = 'none';
  document.getElementById('channelGroups').innerHTML = '';
  if (productList.length > 0) addChannelGroup(); else loadProducts().then(function(){addChannelGroup();});
}
function newSubmission() { resetForm(); document.getElementById('formCard').style.display = 'block'; document.getElementById('successCard').style.display = 'none'; }
function endSubmission() { document.getElementById('successMsg').textContent += ' | 感谢提报！'; }

var channelNames = [];

var channelNames = [];
var channelCodeMap = {};

function fetchAllChannelNames() {
  var cache = localStorage.getItem('channelNamesCache');
  var codeCache = localStorage.getItem('channelCodeMapCache');
  if (cache) {
    try { channelNames = JSON.parse(cache); channelCodeMap = JSON.parse(codeCache || '{}'); } catch(e) { channelNames = []; }
    return;
  }
  channelNames = [];
  channelCodeMap = {};
  var offset = 0;
  function next() {
    api('GET', '/channels?select=full_name,yd_code&order=full_name&limit=1000&offset=' + offset)
      .then(function(data) {
        if (!data || data.length === 0) return;
        var dl = document.getElementById('allChannelsList');
        for (var i = 0; i < data.length; i++) {
          channelNames.push(data[i].full_name);
          if (data[i].yd_code) channelCodeMap[data[i].full_name] = data[i].yd_code;
          if (dl) { var o = document.createElement('option'); o.value = data[i].full_name; dl.appendChild(o); }
        }
        if (data.length >= 1000) { offset += 1000; next(); }
        else {
          localStorage.setItem('channelNamesCache', JSON.stringify(channelNames));
          localStorage.setItem('channelCodeMapCache', JSON.stringify(channelCodeMap));
        }
      }).catch(function() {});
  }
  next();
}

function initChannelDatalist() { fetchAllChannelNames(); }

function showChannelSuggestions(val) { showChannelSuggestionsAt(val, document.getElementById('channelSuggestions'), document.getElementById('channelName')); }
function hideChannelSuggestions() { setTimeout(function() { var d = document.getElementById('channelSuggestions'); if (d) d.style.display = 'none'; }, 150); }

function showChannelSuggestionsAt(val, div, inp) {
  if (!div || !inp) return;
  var kw = (val || '').trim().toLowerCase();
  if (!kw) { div.style.display = 'none'; return; }
  var allMatches = channelNames.filter(function(n) { return n.toLowerCase().indexOf(kw) >= 0; });
  if (allMatches.length === 0) { div.style.display = 'none'; return; }
  var matches = allMatches.slice(0, 20);
  div.innerHTML = '';
  matches.forEach(function(n) {
    var item = document.createElement('button');
    item.type = 'button';
    item.style.cssText = 'display:block;width:100%;text-align:left;border:none;background:none;padding:8px 12px;font-size:14px;font-family:inherit;cursor:pointer;';
    var idx = n.toLowerCase().indexOf(kw);
    item.innerHTML = escapeHTML(n.substring(0, idx)) + '<b>' + escapeHTML(n.substring(idx, idx + kw.length)) + '</b>' + escapeHTML(n.substring(idx + kw.length));
    item.onclick = function(e) {
      e.stopPropagation(); e.preventDefault();
      inp.value = n; div.style.display = 'none'; div._justSelected = true;
      var grp = inp.closest('.channel-group');
      if (grp && channelCodeMap[n]) {
        var codeInp = grp.querySelector('.ch-code');
        if (codeInp) codeInp.value = channelCodeMap[n];
      }
    };
    div.appendChild(item);
  });
  if (allMatches.length > 20) {
    var more = document.createElement('div');
    more.style.cssText = 'color:#999;font-size:11px;padding:4px 12px;';
    more.textContent = '... 还有 ' + (allMatches.length - 20) + ' 条，请继续输入缩小范围';
    div.appendChild(more);
  }
  div.style.display = 'block';
  div.style.zIndex = '9999';
  if ('ontouchstart' in window && window.innerWidth < 768) {
    div.style.position = 'fixed';
    div.style.top = 'auto';
    div.style.left = '0'; div.style.right = '0'; div.style.bottom = '0';
    div.style.maxHeight = '50vh';
    div.style.width = '100%';
    div.style.maxWidth = '100%';
    div.style.borderRadius = '12px 12px 0 0';
  } else {
    var rect = inp.getBoundingClientRect();
    div.style.position = 'fixed';
    div.style.left = rect.left + 'px';
    div.style.top = (rect.bottom + 2) + 'px';
    div.style.width = Math.max(rect.width, 200) + 'px';
  }
  setTimeout(function() {
    var closeFn = function(ev) {
      setTimeout(function() {
        if (!div.contains(ev.target) && document.activeElement !== inp) {
          div.style.display = 'none'; document.removeEventListener('click', closeFn);
        }
      }, 200);
    };
    document.addEventListener('click', closeFn);
  }, 50);
}

function escapeHTML(s) { var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

(function() { populateCities(); loadProducts().then(function(){addChannelGroup();}); initChannelDatalist(); })();
</script>
